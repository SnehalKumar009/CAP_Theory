# --- Minimal primary config for the ASYNCHRONOUS replication POC ---
listen_addresses = '*'
port = 5432

# Write-Ahead Log / streaming replication
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
hot_standby = on

# --- ASYNCHRONOUS replication ---
# The defining difference from the sync POC: synchronous_standby_names is LEFT
# EMPTY. With no named synchronous standby, a COMMIT returns as soon as the
# primary has flushed its OWN WAL — it never waits for the standby. Replication
# still happens, just in the background (eventually consistent).
synchronous_commit = on
# synchronous_standby_names = ''   # (empty on purpose => asynchronous)

# Point at our custom host-based auth file.
hba_file = '/etc/postgresql/pg_hba.conf'
