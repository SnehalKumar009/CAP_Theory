# =====================================================================
# Synchronous Replication CAP POC — Phases 1..3
#   pg-primary  : PostgreSQL master (accepts writes)
#   pg-standby  : PostgreSQL synchronous standby (must ACK every commit)
#   app         : Spring Boot service (writes go to primary)
#
# Sync replication is enabled via bitnami env vars, which under the hood set
# native PostgreSQL:  synchronous_commit=on  and  synchronous_standby_names.
# With 1 required synchronous replica, a commit on the primary BLOCKS until the
# standby acknowledges the WAL. Take the standby down => writes block (CP).
# =====================================================================

services:
  pg-primary:
    image: postgres:16-alpine
    container_name: pg-primary
    ports:
      - "5432:5432"
    environment:
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: repl_user
      POSTGRESQL_REPLICATION_PASSWORD: repl_password
      POSTGRESQL_USERNAME: app_user
      POSTGRESQL_PASSWORD: app_password
      POSTGRESQL_DATABASE: appdb
      POSTGRESQL_POSTGRES_PASSWORD: admin_password
      # --- synchronous replication ---
      POSTGRESQL_SYNCHRONOUS_COMMIT_MODE: "on"
      POSTGRESQL_NUM_SYNCHRONOUS_REPLICAS: "1"
    volumes:
      - primary_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - syncrepl-net

  pg-standby:
    image: postgres:16-alpine
    container_name: pg-standby
    ports:
      - "5433:5432"
    depends_on:
      pg-primary:
        condition: service_healthy
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: repl_user
      POSTGRESQL_REPLICATION_PASSWORD: repl_password
      POSTGRESQL_MASTER_HOST: pg-primary
      POSTGRESQL_MASTER_PORT_NUMBER: "5432"
      POSTGRESQL_USERNAME: app_user
      POSTGRESQL_PASSWORD: app_password
      POSTGRESQL_DATABASE: appdb
      POSTGRESQL_POSTGRES_PASSWORD: admin_password
    volumes:
      - standby_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - syncrepl-net

  app:
    build:
      context: ./app
      # Build with host networking so Maven can reach the internet even when the
      # default build bridge network cannot (registry pulls work, Maven Central did not).
      network: host
    container_name: syncrepl-app
    ports:
      - "8080:8080"
    depends_on:
      pg-primary:
        condition: service_healthy
      pg-standby:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://pg-primary:5432/appdb
      SPRING_DATASOURCE_USERNAME: app_user
      SPRING_DATASOURCE_PASSWORD: app_password
    networks:
      - syncrepl-net

volumes:
  primary_data:
  standby_data:

networks:
  syncrepl-net:
    name: syncrepl-net
