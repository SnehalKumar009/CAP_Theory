# =====================================================================
# Synchronous Replication CAP POC — Phases 1..3
#   pg-primary  : PostgreSQL master (accepts writes)
#   pg-standby  : PostgreSQL synchronous standby (must ACK every commit)
#   app         : Spring Boot service (writes go to primary)
#
# Uses the official postgres:16-alpine image with NATIVE streaming replication
# configured by hand (no vendor helper scripts).
# With synchronous_commit=on and one required sync standby ('standby1'), a commit
# on the primary BLOCKS until the standby ACKs the WAL. Take the standby down =>
# writes block (Consistency over Availability).
# =====================================================================

services:
  pg-primary:
    image: postgres:16-alpine
    container_name: pg-primary
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: appdb
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    volumes:
      - ./postgres/primary/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/primary/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/primary/init:/docker-entrypoint-initdb.d:ro
      - primary_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d appdb -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - syncrepl-net

  pg-standby:
    image: postgres:16-alpine
    container_name: pg-standby
    ports:
      - "5433:5432"
    depends_on:
      pg-primary:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/standby-entrypoint.sh"]
    volumes:
      - ./postgres/standby/standby-entrypoint.sh:/standby-entrypoint.sh:ro
      - standby_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d appdb -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - syncrepl-net

  app:
    build:
      context: ./app
      # Build with host networking so Maven can reach the internet even when the
      # default build bridge network cannot (registry pulls work, Maven Central did not).
      network: host
    container_name: syncrepl-app
    ports:
      - "8080:8080"
    depends_on:
      pg-primary:
        condition: service_healthy
      pg-standby:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://pg-primary:5432/appdb
      SPRING_DATASOURCE_USERNAME: app_user
      SPRING_DATASOURCE_PASSWORD: app_password
    networks:
      - syncrepl-net

volumes:
  primary_data:
  standby_data:

networks:
  syncrepl-net:
    name: syncrepl-net
