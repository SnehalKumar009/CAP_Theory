# --- Minimal production-style primary config for the POC ---
listen_addresses = '*'
port = 5432

# Write-Ahead Log / streaming replication
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
hot_standby = on

# --- Synchronous replication (the core of this POC) ---
# NOTE: synchronous_standby_names is intentionally NOT set here. If it were set
# in this static config, the temporary bootstrap server used during first-time
# initialization would also load it, and the CREATE ROLE commit would block
# forever waiting for a standby that doesn't exist yet. Instead it is applied via
# ALTER SYSTEM (see init/02-sync-standby.sql), which only takes effect when the
# real server starts.
synchronous_commit = on

# Point at our custom host-based auth file.
hba_file = '/etc/postgresql/pg_hba.conf'
