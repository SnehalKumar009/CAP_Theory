# --- Minimal primary config for the SEMI-SYNCHRONOUS replication POC ---
listen_addresses = '*'
port = 5432

# Write-Ahead Log / streaming replication
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
hot_standby = on

# --- SEMI-SYNCHRONOUS replication ---
# synchronous_standby_names is applied via ALTER SYSTEM (init/02-semi-sync.sql)
# as:  ANY 1 (standby1, standby2)
# Meaning: a commit waits for AT LEAST ONE of the two standbys to confirm the WAL.
# One standby down -> the other confirms -> writes continue.
# Both standbys down -> no one can confirm -> writes block.
# (Kept out of this static file so the bootstrap temp server does not block init.)
synchronous_commit = on

# Point at our custom host-based auth file.
hba_file = '/etc/postgresql/pg_hba.conf'
